version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - story_data:/app/data
    environment:
      - ENVIRONMENT=development

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./dashboard/src:/app/src

volumes:
  story_data:
